[build]
  base = "apps/web"
  command = "cd ../.. && pnpm install --frozen-lockfile && pnpm --filter web build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "10.31.0"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Mobilithek-Push sollte in Produktion ueber apps/mobilithek-gateway laufen,
# weil Netlify gzip+application/json Bodies als Text an die Runtime geben kann.
# Diese Redirects bleiben als Fallback fuer unkomprimierte Testpayloads bestehen.
[[redirects]]
  from = "/api/admin/mobilithek/webhook/:feedId"
  to = "/.netlify/functions/mobilithek-webhook/:feedId"
  status = 200
  force = true

[[redirects]]
  from = "/api/mobilithek/webhook"
  to = "/.netlify/functions/mobilithek-webhook"
  status = 200
  force = true

[[headers]]
  for = "/api/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
